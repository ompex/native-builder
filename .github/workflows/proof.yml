name: Private engine build proof

on:
  workflow_dispatch:
    inputs:
      engine_ref:
        description: Exact ompex/engine commit to build
        required: true
        type: string

permissions:
  contents: read

jobs:
  linux-x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out build recipes
        uses: actions/checkout@v7.0.0

      - name: Check out private engine commit
        uses: actions/checkout@v7.0.0
        with:
          repository: ompex/engine
          ref: ${{ inputs.engine_ref }}
          token: ${{ secrets.ENGINE_READ_TOKEN }}
          path: engine
          fetch-depth: 1
          persist-credentials: false

      - name: Verify private engine commit
        env:
          ENGINE_REF: ${{ inputs.engine_ref }}
        run: test "$(git -C engine rev-parse HEAD)" = "$ENGINE_REF"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-04-29

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Build and load Linux x64 addon
        working-directory: engine
        run: |
          bun install --frozen-lockfile
          bun --cwd=packages/natives run build
          bun -e 'import * as native from "@oh-my-pi/pi-natives"; if (typeof native.glob !== "function") process.exit(1)'
