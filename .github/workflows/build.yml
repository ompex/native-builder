name: Build native targets

on:
  workflow_dispatch:
    inputs:
      engine_ref:
        description: Exact 40-character lowercase engine commit SHA to build
        required: true
        type: string
  # poll-engine.yml calls this workflow for release tags it discovers, so
  # release builds need no cross-repo dispatch credential. Note the
  # artifacts of called runs belong to the CALLER's run; the engine locates
  # them by artifact name, never by workflow run listing.
  workflow_call:
    inputs:
      engine_ref:
        required: true
        type: string

jobs:
  native:
    name: ${{ matrix.target_id }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_id: linux-x64-baseline
            runner: ubuntu-24.04
            platform: linux
            arch: x64
            variant: baseline
            glibc: "2.17"
            rust_checks: "true"
          - target_id: linux-x64-modern
            runner: ubuntu-24.04
            platform: linux
            arch: x64
            variant: modern
            glibc: "2.17"
            rust_checks: "false"
          - target_id: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
            glibc: "2.17"
            rust_checks: "false"
          # Both darwin targets build on macOS 26 images (free labels:
          # macos-26-intel for x64, macos-26 for arm64). Host OS does not
          # raise the addon's deployment target - rustc pins each
          # *-apple-darwin target's minimum itself.
          - target_id: darwin-x64-baseline
            runner: macos-26-intel
            platform: darwin
            arch: x64
            variant: baseline
            rust_checks: "false"
          - target_id: darwin-arm64
            runner: macos-26
            platform: darwin
            arch: arm64
            rust_checks: "false"
    steps:
      - name: Check out private engine commit
        env:
          ENGINE_DEPLOY_KEY: ${{ secrets.ENGINE_DEPLOY_KEY }}
          ENGINE_REF: ${{ inputs.engine_ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! "$ENGINE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "engine_ref must be an exact 40-character lowercase commit SHA"
            exit 1
          fi
          install -d -m 0700 ~/.ssh
          install -m 0600 /dev/null ~/.ssh/engine_deploy_key
          printf '%s\n' "$ENGINE_DEPLOY_KEY" > ~/.ssh/engine_deploy_key
          # Host keys over authenticated HTTPS (TLS PKI), not TOFU ssh-keyscan.
          gh api meta --jq '.ssh_keys[] | "github.com \(.)"' > ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/engine_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          git init .
          git remote add origin git@github.com:ompex/engine.git
          git fetch --depth=1 origin "$ENGINE_REF"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$ENGINE_REF"
          rm -f ~/.ssh/engine_deploy_key

      - name: Compute native source hash
        id: hash
        shell: bash
        # Single canonical implementation, shared with engine CI via the
        # engine checkout - the two pipelines cannot fork.
        run: echo "source-hash=$(bash scripts/ci/native-source-hash.sh)" >> "$GITHUB_OUTPUT"

      - name: Build, attest, and upload target addon
        uses: ./.github/actions/build-native
        with:
          hash: ${{ steps.hash.outputs.source-hash }}
          engine_sha: ${{ inputs.engine_ref }}
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          variant: ${{ matrix.variant }}
          target: ${{ matrix.target }}
          glibc: ${{ matrix.glibc }}
          rust_checks: ${{ matrix.rust_checks }}
          save_cache: "false"
